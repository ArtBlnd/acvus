name = "chat"
kind = "llm"
provider = "gemini"
model = "gemini-2.5-flash"

[self]

[execution]
mode = "once-per-turn"

[persistency]
kind = "deque"
inline_bind = "@self | extend(@raw)"

[[messages]]
role = "system"
inline_template = "You are a helpful assistant. Answer concisely."

[[messages]]
iterator = "@self"

[[messages]]
role = "user"
inline_template = "{{ @input }}"
