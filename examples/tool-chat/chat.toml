name = "chat"
kind = "llm"
provider = "gemini"
model = "gemini-2.5-flash"

[self]

[execution]
mode = "once-per-turn"

[persistency]
kind = "deque"
inline_bind = "@self | extend(@raw)"

[[messages]]
role = "system"
template = "system.acvus"

[[messages]]
iterator = "@self"

[[messages]]
role = "user"
template = "user.acvus"

[[tools]]
name = "get_weather"
description = "Get current weather for a city"
node = "get_weather"
params = { city = "string" }
